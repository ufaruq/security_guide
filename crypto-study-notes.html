<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptographic Engineering — Study Notes</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131925;
    --surface2: #1a2233;
    --border: #2a3444;
    --accent: #00d4aa;
    --accent2: #7c5cfc;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --accent5: #00bfff;
    --text: #e0e6ed;
    --text-dim: #8892a4;
    --text-bright: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ─── Resource bar ─── */
  .resource-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 6px;
    z-index: 200;
    font-size: 12px;
  }
  .resource-bar span { color: var(--text-dim); margin-right: 4px; }
  .resource-bar a {
    color: var(--accent); text-decoration: none;
    padding: 4px 12px;
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 5px;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .resource-bar a:last-child { color: var(--accent2); border-color: rgba(124,92,252,0.3); }
  .resource-bar a:hover { background: rgba(0,212,170,0.1); }
  .resource-bar a:last-child:hover { background: rgba(124,92,252,0.1); }

  /* ─── Layout ─── */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 300px;
    min-height: 100vh;
    padding-top: 40px;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: fixed;
    top: 40px;
    width: 240px;
    height: calc(100vh - 40px);
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    padding: 0 16px;
    margin-bottom: 16px;
  }
  .sidebar .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 14px 16px 4px;
    opacity: 0.6;
  }
  .sidebar a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .sidebar a:hover { color: var(--text-bright); background: rgba(0,212,170,0.05); border-left-color: var(--accent); }
  .sidebar a .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar a .progress-dot.done { background: var(--accent); border-color: var(--accent); }
  .sidebar a .progress-dot.partial { background: var(--accent4); border-color: var(--accent4); }
  .sidebar a .progress-dot.review { background: var(--accent3); border-color: var(--accent3); }

  /* ─── Progress Bar ─── */
  .progress-bar-container {
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ─── Main Content ─── */
  .main {
    margin-left: 240px;
    margin-right: 300px;
    padding: 40px 48px 100px;
    max-width: 800px;
  }

  h1 {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .subtitle { color: var(--text-dim); font-size: 16px; margin-bottom: 32px; }

  /* ─── Section ─── */
  .study-section {
    margin-bottom: 48px;
    scroll-margin-top: 20px;
  }
  .study-section h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .study-section h2 .section-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge-tls { background: rgba(0,212,170,0.15); color: var(--accent); }
  .badge-pki { background: rgba(124,92,252,0.15); color: var(--accent2); }
  .badge-verify { background: rgba(255,217,61,0.15); color: var(--accent4); }
  .badge-supply { background: rgba(255,107,107,0.15); color: var(--accent3); }
  .badge-git { background: rgba(0,191,255,0.15); color: var(--accent5); }
  .badge-browser { background: rgba(124,92,252,0.15); color: #7c5cfc; }
  .badge-appsec { background: rgba(255,107,107,0.15); color: #ff6b6b; }

  /* ─── Topic Card ─── */
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .topic-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .topic-header:hover { background: rgba(0,212,170,0.03); }
  .topic-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--text-bright);
  }
  .topic-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-btn {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .status-btn:hover { border-color: var(--accent); }
  .status-btn.active-understood { background: rgba(0,212,170,0.15); border-color: var(--accent); color: var(--accent); }
  .status-btn.active-review { background: rgba(255,217,61,0.15); border-color: var(--accent4); color: var(--accent4); }
  .status-btn.active-confused { background: rgba(255,107,107,0.15); border-color: var(--accent3); color: var(--accent3); }

  .topic-body {
    display: none;
    padding: 0 18px 18px;
  }
  .topic-card.open .topic-body { display: block; }

  /* ─── Key Concepts ─── */
  .key-concepts {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .key-concepts .kc-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .key-concepts p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  /* ─── Prompts ─── */
  .study-prompts {
    margin-bottom: 14px;
  }
  .study-prompts .prompt-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent2);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .prompt-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .prompt-item::before {
    content: '?';
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(124,92,252,0.15);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ─── Note area ─── */
  .note-area {
    margin-top: 12px;
  }
  .note-area label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent4);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .note-area textarea {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }
  .note-area textarea:focus { border-color: var(--accent); }
  .note-area textarea::placeholder { color: #3a4555; }

  /* ─── Connections ─── */
  .connections {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .connections .conn-label {
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .conn-link {
    display: inline-block;
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 11px;
    margin: 2px 4px 2px 0;
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
    border: 1px solid transparent;
  }
  .conn-link:hover { border-color: var(--accent); }

  /* ─── Right Panel: Review Queue ─── */
  .review-panel {
    position: fixed;
    right: 0; top: 0;
    width: 300px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .review-panel h3 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .review-panel h4 {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .review-item {
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border 0.15s;
    border: 1px solid transparent;
  }
  .review-item:hover { border-color: var(--accent); }
  .review-item .ri-title { font-size: 13px; font-weight: 600; color: var(--text-bright); }
  .review-item .ri-note { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .stat-num { font-size: 24px; font-weight: 800; }
  .stat-box .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
  .stat-green .stat-num { color: var(--accent); }
  .stat-yellow .stat-num { color: var(--accent4); }
  .stat-red .stat-num { color: var(--accent3); }
  .stat-dim .stat-num { color: var(--text-dim); }

  /* ─── Export button ─── */
  .export-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.9; }

  /* ─── Responsive ─── */
  @media (max-width: 1100px) {
    .app { grid-template-columns: 1fr; }
    .sidebar, .review-panel { display: none; }
    .main { margin: 0; padding: 24px 20px; max-width: 100%; }
  }
</style>
</head>

<div class="resource-bar">
  <span>📚 Study Resources:</span>
  <a href="tls-cryptographic-engineering-guide.html" target="_blank">📖 Full Reference Guide</a>
  <a href="crypto-mind-map.html" target="_blank">🗺️ Interactive Mind Map</a>
  <a href="web-app-security.html" target="_blank">🔓 Web App Security</a>
  <a href="browser-security.html" target="_blank">🛡️ Browser Security</a>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h2>Study Tracker</h2>
    <div class="progress-bar-container">
      <div class="progress-label">
        <span>Overall Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>
    <div id="sidebar-links"></div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main-content"></main>

  <!-- Review Panel -->
  <aside class="review-panel" id="review-panel">
    <h3>Dashboard</h3>
    <div class="stats-grid" id="stats-grid"></div>
    <h4 id="review-header">Needs Review</h4>
    <div id="review-list"></div>
    <h4>Confused</h4>
    <div id="confused-list"></div>
    <button class="export-btn" id="export-btn">Export All Notes (.md)</button>
  </aside>
</div>

<script>
// ─── Study Data ───
const sections = [
  {
    id: "tls", title: "TLS & Handshake", badge: "badge-tls",
    topics: [
      {
        id: "tls-overview", title: "TLS 1.3 Overview",
        concepts: "TLS provides confidentiality (encryption), integrity (tamper detection), and authentication (identity verification). TLS 1.3 (RFC 8446) removed all insecure legacy features — every removal maps to a named attack.",
        prompts: [
          "What three guarantees does TLS provide?",
          "Why did TLS 1.3 remove RSA key exchange?",
          "Name three things TLS 1.3 removed and the attacks they enabled.",
        ],
        connections: ["tls-handshake", "tls-cipher", "tls-attacks"]
      },
      {
        id: "tls-handshake", title: "TLS 1.3 Handshake (1-RTT)",
        concepts: "Client speculatively sends key shares in ClientHello. Server responds with its key share. Both derive handshake keys via HKDF. Everything after ServerHello is encrypted. The handshake completes in 1 round-trip." +
          '<pre style=\"background:#0a0e17;border:1px solid #2a3444;border-radius:6px;padding:14px;margin-top:12px;font-size:12px;line-height:1.5;color:#8892a4;overflow-x:auto;\">' +
          'Client                                  Server\n' +
          '  |                                       |\n' +
          '  |--- ClientHello + KeyShare ----------->|\n' +
          '  |    (supported ciphers, extensions)    |\n' +
          '  |                                       |\n' +
          '  |<-- ServerHello + KeyShare ------------|\n' +
          '  |<-- {EncryptedExtensions} ------------|\n' +
          '  |<-- {Certificate} --------------------|\n' +
          '  |<-- {CertificateVerify} --------------|\n' +
          '  |<-- {Finished} -----------------------|\n' +
          '  |                                       |\n' +
          '  |--- {Finished} ----------------------->|\n' +
          '  |                                       |\n' +
          '  |<== Application Data =================>|\n' +
          '\n' +
          '  {} = encrypted with handshake keys</pre>',
        prompts: [
          "Draw the TLS 1.3 handshake from memory — what messages are sent?",
          "Why are the Certificate and CertificateVerify messages encrypted in TLS 1.3 but not in 1.2?",
          "What is the CertificateVerify message and why is it necessary beyond chain validation?",
        ],
        connections: ["tls-ecdhe", "tls-hkdf", "tls-0rtt"]
      },
      {
        id: "tls-hkdf", title: "HKDF Key Schedule",
        concepts: "HKDF-Extract combines inputs (PSK, ECDHE shared secret). Derive-Secret produces keys with transcript hash binding. Three stages: Early Secret → Handshake Secret → Master Secret. Transcript hash at each step means tampering breaks all derived keys.",
        prompts: [
          "Walk through the three stages of the TLS 1.3 key schedule.",
          "Why does the key schedule incorporate the transcript hash at each derivation step?",
          "What happens if an attacker modifies a handshake message?",
        ],
        connections: ["tls-handshake", "verify-hmac"]
      },
      {
        id: "tls-0rtt", title: "0-RTT Resumption",
        concepts: "Uses a pre-shared key (PSK) from a previous session to send data immediately. 0-RTT has two distinct, orthogonal security limitations: (1) Lack of forward secrecy — early data keys are derived from the PSK (session ticket), not a fresh ephemeral key exchange, so compromise of the ticket key exposes past early data. (2) Replay vulnerability — the server cannot distinguish a legitimately retransmitted first message from an attacker replaying it, because no server-side nonce has been exchanged yet. Only safe for idempotent requests (GET). Server must implement anti-replay (e.g., single-use tokens or time-window checks).",
        prompts: [
          "Why does 0-RTT lack forward secrecy? (Hint: what key material are early data keys derived from?)",
          "Why is 0-RTT vulnerable to replay, and why are these two problems orthogonal to each other?",
          "What types of requests are safe to send as 0-RTT data?",
          "How can a server mitigate 0-RTT replay attacks?",
        ],
        connections: ["tls-handshake"]
      },
      {
        id: "tls-ecdhe", title: "ECDHE Key Exchange",
        concepts: "Both sides generate ephemeral key pairs on an elliptic curve (X25519 or P-256). They exchange public keys and compute the same shared secret via scalar multiplication. Ephemeral means keys are discarded after use = forward secrecy.",
        prompts: [
          "Explain ECDHE key exchange in your own words — how do both sides arrive at the same shared secret?",
          "What does 'ephemeral' mean and why does it provide forward secrecy?",
          "What would happen if TLS used static DH keys instead of ephemeral ones?",
        ],
        connections: ["tls-forward", "tls-cipher"]
      },
      {
        id: "tls-forward", title: "Forward Secrecy",
        concepts: "Even if the server's long-term private key is compromised later, past session keys cannot be recovered because they depended on ephemeral keys that were discarded. This is why TLS 1.3 mandates ephemeral DH and removed RSA key transport.",
        prompts: [
          "Explain why RSA key exchange doesn't provide forward secrecy.",
          "If an attacker records all traffic today and steals the server key next year, can they decrypt the recordings? Why or why not?",
        ],
        connections: ["tls-ecdhe"]
      },
      {
        id: "tls-cipher", title: "Cipher Suites & AEAD",
        concepts: "TLS 1.3 only allows 5 cipher suites. All use AEAD (Authenticated Encryption with Associated Data) — encryption + integrity in one operation. AES-GCM (hardware-accelerated) and ChaCha20-Poly1305 (fast on devices without AES hardware acceleration) are dominant.",
        prompts: [
          "What does AEAD stand for and why is it better than separate encryption + MAC?",
          "When would you prefer ChaCha20-Poly1305 over AES-GCM?",
          "Why does TLS 1.3 only specify the AEAD + hash in the cipher suite name?",
        ],
        connections: ["tls-overview", "verify-mac"]
      },
      {
        id: "tls-sni", title: "SNI & Encrypted Client Hello",
        concepts: "SNI sends the target hostname in plaintext in the ClientHello — a privacy leak. ECH splits the ClientHello into an outer (plaintext, with cover SNI) and inner (encrypted, with real SNI), using a key published in DNS. Requires encrypted DNS (DoH or DoT) to protect the ECH config key. Observer only sees the CDN hostname.",
        prompts: [
          "Why can't TLS encrypt the SNI natively (without ECH)?",
          "How does ECH use DNS to distribute the encryption key?",
          "What happens if ECH is deployed without encrypted DNS (DoH or DoT)?",
        ],
        connections: ["tls-handshake", "pki-dane"]
      },
      {
        id: "tls-inspect", title: "TLS Inspection",
        concepts: "A corporate proxy terminates TLS from both sides: browser↔proxy (using proxy's cert signed by org CA) and proxy↔server (real cert). The org pushes their root CA into device trust stores. Breaks end-to-end trust. Incompatible with certificate pinning.",
        prompts: [
          "Draw the two TLS sessions in a TLS inspection setup.",
          "Why does TLS inspection require the org's root CA in the trust store?",
          "Why does certificate pinning break TLS inspection? Is this a feature or a bug?",
        ],
        connections: ["pki-chain", "pki-pinning"]
      },
      {
        id: "tls-attacks", title: "Known TLS Attacks",
        concepts: "BEAST (CBC IV), POODLE (CVE-2014-3566 — padding oracle on SSL 3.0's CBC padding; the fix was disabling SSL 3.0 entirely, not a TLS-level mitigation; a later variant, POODLE-TLS, affected some TLS CBC implementations but the original attack is SSL 3.0-specific), DROWN (SSLv2 cross-protocol), FREAK/Logjam (export ciphers), ROBOT (Bleichenbacher), Heartbleed (OpenSSL buffer over-read). Almost every attack targeted backward-compatible features that TLS 1.3 removed.",
        prompts: [
          "Pick three attacks from the table and explain what they exploited.",
          "What pattern connects most TLS attacks?",
          "Why was Heartbleed different from the other attacks?",
        ],
        connections: ["tls-overview", "tls-cipher"]
      },
    ]
  },
  {
    id: "pki", title: "PKI & Certificates", badge: "badge-pki",
    topics: [
      {
        id: "pki-chain", title: "Chain of Trust",
        concepts: "Root CA (self-signed, in trust store) → Intermediate CA (signed by root, does issuance) → Leaf cert (signed by intermediate, bound to a domain). Each link is verified by checking the issuer's signature. Intermediates provide defense in depth.",
        prompts: [
          "Why don't root CAs sign leaf certificates directly?",
          "What happens if an intermediate CA is compromised? Compare to root compromise.",
          "How does the browser build the chain from a leaf cert to a trusted root?",
        ],
        connections: ["pki-x509", "pki-verify"]
      },
      {
        id: "pki-x509", title: "X.509 Certificate Format",
        concepts: "Contains: subject (identity), public key, issuer, serial number, validity period, SAN (domain names), key usage, basic constraints (CA:TRUE/FALSE), AIA (OCSP responder URL), SCTs (Certificate Transparency). The CA's signature covers all of this.",
        prompts: [
          "What's the difference between the Subject CN and the Subject Alternative Name?",
          "Why is the Basic Constraints extension critical?",
          "What are SCTs and why are they in the certificate?",
        ],
        connections: ["pki-chain", "pki-ct"]
      },
      {
        id: "pki-verify", title: "7-Step Certificate Verification",
        concepts: "1) Chain building, 2) Signature verification walking up, 3) Validity period, 4) Revocation check, 5) Name matching (SAN), 6) Constraint checks (Basic Constraints, Key Usage), 7) CertificateVerify (proves server has the private key).",
        prompts: [
          "List all 7 steps from memory.",
          "Why is step 7 (CertificateVerify) separate from chain validation?",
          "What happens if the server omits the intermediate certificate?",
        ],
        connections: ["pki-chain", "pki-revoke"]
      },

    const dotClass = status === 'understood' ? 'done' : status === 'review' ? 'partial' : status === 'confused' ? 'review' : '';
    sidebarLinks.innerHTML += `<a href="#${t.id}"><span class="progress-dot ${dotClass}" data-sidebar-dot="${t.id}"></span>${t.title}</a>`;
  });

  // Main content
  html += `<div class="study-section" id="section-${sec.id}"><h2>${sec.title} <span class="section-badge ${sec.badge}">${sec.topics.length} topics</span></h2>`;

  sec.topics.forEach(t => {
    const isOpen = topicNotes[t.id] ? 'open' : '';
    html += `
      <div class="topic-card ${isOpen}" id="${t.id}">
        <div class="topic-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="topic-title">${t.title}</span>
          <div class="topic-status">
            <button class="status-btn ${topicStatuses[t.id]==='understood'?'active-understood':''}" onclick="event.stopPropagation();setStatus('${t.id}','understood',this)">✓ Got it</button>
            <button class="status-btn ${topicStatuses[t.id]==='review'?'active-review':''}" onclick="event.stopPropagation();setStatus('${t.id}','review',this)">⟳ Review</button>
            <button class="status-btn ${topicStatuses[t.id]==='confused'?'active-confused':''}" onclick="event.stopPropagation();setStatus('${t.id}','confused',this)">? Confused</button>
          </div>
        </div>
        <div class="topic-body">
          <div class="key-concepts">
            <div class="kc-title">Key Concepts</div>
            <p>${t.concepts}</p>
          </div>
          <div class="study-prompts">
            <div class="prompt-label">Test Yourself</div>
            ${t.prompts.map(p => `<div class="prompt-item">${p}</div>`).join('')}
          </div>
          <div class="note-area">
            <label>Your Notes</label>
            <textarea placeholder="Write your understanding, questions, insights..." data-topic="${t.id}" oninput="saveNote('${t.id}', this.value)">${escapeHtml(topicNotes[t.id] || '')}</textarea>
          </div>
          <div class="connections">
            <div class="conn-label">Related Topics:</div>
            ${t.connections.map(c => {
              const target = sections.flatMap(s => s.topics).find(x => x.id === c);
              return target ? `<a class="conn-link" href="#${c}">${target.title}</a>` : '';
            }).join('')}
          </div>
        </div>
      </div>`;
  });

  html += `</div>`;
});

mainEl.innerHTML = html;

// ─── Functions ───
function setStatus(topicId, status, btn) {
  // Toggle off if already active
  if (topicStatuses[topicId] === status) {
    delete topicStatuses[topicId];
    btn.className = 'status-btn';
  } else {
    topicStatuses[topicId] = status;
    // Clear siblings
    const parent = btn.parentElement;
    parent.querySelectorAll('.status-btn').forEach(b => b.className = 'status-btn');
    btn.className = `status-btn active-${status}`;
  }
  saveState();
  updateDashboard();
  updateSidebar();
}

function saveNote(topicId, value) {
  topicNotes[topicId] = value;
  saveState();
  updateDashboard();
}

function updateSidebar() {
  sections.flatMap(s => s.topics).forEach(t => {
    const dot = document.querySelector(`[data-sidebar-dot="${t.id}"]`);
    if (!dot) return;
    const status = topicStatuses[t.id] || '';
    dot.className = 'progress-dot';
    if (status === 'understood') dot.classList.add('done');
    else if (status === 'review') dot.classList.add('partial');
    else if (status === 'confused') dot.classList.add('review');
  });

  // Update progress
  const all = sections.flatMap(s => s.topics);
  const done = all.filter(t => topicStatuses[t.id] === 'understood').length;
  const pct = Math.round((done / all.length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateDashboard() {
  const all = sections.flatMap(s => s.topics);
  const understood = all.filter(t => topicStatuses[t.id] === 'understood').length;
  const review = all.filter(t => topicStatuses[t.id] === 'review').length;
  const confused = all.filter(t => topicStatuses[t.id] === 'confused').length;
  const notStarted = all.length - understood - review - confused;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-box stat-green"><div class="stat-num">${understood}</div><div class="stat-label">Understood</div></div>
    <div class="stat-box stat-yellow"><div class="stat-num">${review}</div><div class="stat-label">Review</div></div>
    <div class="stat-box stat-red"><div class="stat-num">${confused}</div><div class="stat-label">Confused</div></div>
    <div class="stat-box stat-dim"><div class="stat-num">${notStarted}</div><div class="stat-label">Not Started</div></div>
  `;

  // Review list
  const reviewList = document.getElementById('review-list');
  const reviewTopics = all.filter(t => topicStatuses[t.id] === 'review');
  reviewList.innerHTML = reviewTopics.length ? reviewTopics.map(t =>
    `<div class="review-item" onclick="document.getElementById('${t.id}').scrollIntoView({behavior:'smooth'});document.getElementById('${t.id}').classList.add('open')">
      <div class="ri-title">${t.title}</div>
      ${topicNotes[t.id] ? `<div class="ri-note">${escapeHtml(topicNotes[t.id])}</div>` : ''}
    </div>`
  ).join('') : '<div style="font-size:12px;color:var(--text-dim);">No topics marked for review yet.</div>';

  // Confused list
  const confusedList = document.getElementById('confused-list');
  const confusedTopics = all.filter(t => topicStatuses[t.id] === 'confused');
  confusedList.innerHTML = confusedTopics.length ? confusedTopics.map(t =>
    `<div class="review-item" onclick="document.getElementById('${t.id}').scrollIntoView({behavior:'smooth'});document.getElementById('${t.id}').classList.add('open')">
      <div class="ri-title">${t.title}</div>
      ${topicNotes[t.id] ? `<div class="ri-note">${escapeHtml(topicNotes[t.id])}</div>` : ''}
    </div>`
  ).join('') : '<div style="font-size:12px;color:var(--text-dim);">No topics marked as confused.</div>';
}

// ─── Export ───
document.getElementById('export-btn').addEventListener('click', () => {
  let md = `# Cryptographic Engineering — Study Notes\n\nExported: ${new Date().toLocaleDateString()}\n\n`;
  const all = sections.flatMap(s => s.topics);
  const understood = all.filter(t => topicStatuses[t.id] === 'understood').length;
  md += `**Progress:** ${understood}/${all.length} topics understood\n\n---\n\n`;

  sections.forEach(sec => {
    md += `## ${sec.title}\n\n`;
    sec.topics.forEach(t => {
      const status = topicStatuses[t.id] || 'not started';
      const icon = status === 'understood' ? '✅' : status === 'review' ? '🔄' : status === 'confused' ? '❓' : '⬜';
      md += `### ${icon} ${t.title}\n`;
      md += `**Status:** ${status}\n\n`;
      md += `**Key Concepts:** ${t.concepts}\n\n`;
      if (topicNotes[t.id]) {
        md += `**My Notes:**\n${topicNotes[t.id]}\n\n`;
      }
      md += `---\n\n`;
    });
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `crypto-study-notes-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
});

// Init
updateDashboard();
updateSidebar();
</script>
</body>
</html>
